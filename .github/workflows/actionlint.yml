name: Actionlint

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
      - ".github/actionlint.yml"
      - ".github/actionlint.yaml"

  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
      - ".github/actionlint.yml"
      - ".github/actionlint.yaml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-22.04
    env:
      ACTIONLINT_VERSION: "1.7.12"
      ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install actionlint
        run: |
          set -euo pipefail

          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"

          curl --fail --silent --show-error --location --output "${archive}" "${url}"
          echo "${ACTIONLINT_SHA256}  ${archive}" | sha256sum --check --

          mkdir -p "${RUNNER_TEMP}/actionlint"
          tar -xzf "${archive}" -C "${RUNNER_TEMP}/actionlint" actionlint
          echo "${RUNNER_TEMP}/actionlint" >> "${GITHUB_PATH}"

      - name: Run actionlint
        run: actionlint -color
