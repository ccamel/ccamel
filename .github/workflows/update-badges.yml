name: Update Badges

on:
  workflow_run:
    workflows: ["Update Activity"]
    types: [completed]

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  update-badges:
    runs-on: ubuntu-22.04
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          fetch-depth: 2
          token: ${{ secrets.BADGES_TOKEN }}

      - name: Update My Badges
        run: npx update-my-badges@1.0.247 ${{ github.repository_owner }}
        env:
          GITHUB_TOKEN: ${{ secrets.BADGES_TOKEN }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Reset last commit if "Update badges" from update-my-badges
        run: |
          LAST_COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          echo "Last commit message is '$LAST_COMMIT_MESSAGE'"
          if [[ "$LAST_COMMIT_MESSAGE" == "Update badges" ]]; then
            echo "Resetting last commit"
            git reset HEAD~1
          else
            echo "Last commit is not from update-my-badges"
          fi

      - name: Prettify README.md
        run: |
          echo "Prettifying README.md"
          npx prettier@3.0.3 README.md --write

      - name: Commit changes if necessary
        run: |
          if [[ $(git status -s) ]]; then
            git commit --all -S \
              --message="docs(README): update my badges"
            git push --force-with-lease
            echo "Commit pushed"
          else
            echo "No changes to commit"
          fi
