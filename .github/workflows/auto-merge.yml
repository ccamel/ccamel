name: Auto merge

on:
  pull_request:

jobs:
  auto-merge-dependabot:
    runs-on: ubuntu-22.04
    steps:
      - name: Auto merge PR
        uses: ahmadnassri/action-dependabot-auto-merge@45fc124d949b19b6b8bf6645b6c9d55f4f9ac61a # v2.6.6
        with:
          target: minor
          approve: true
          github-token: ${{ secrets.AUTOMERGE_TOKEN }}
